name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'

env:
  # Opt-in naar Node.js 24 voor alle JavaScript-actions (GitHub dwingt dit vanaf 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Swift analyse draait op macOS (alleen taal in deze repo sinds de Node.js-backend is verwijderd).
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # --- Swift: handmatige build (vervangt de falende autobuild) ---
      - name: Select Xcode Version
        if: matrix.language == 'swift'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Setup Dummy Secrets for Build
        if: matrix.language == 'swift'
        # Kopieer het dummy template naar Secrets.swift zodat het project succesvol compileert.
        run: cp AIFitnessCoach/Secrets-template.swift AIFitnessCoach/Secrets.swift

      - name: Manual Build for Swift
        if: matrix.language == 'swift'
        run: |
          # Haal dynamisch de UUID op van de eerste beschikbare iPhone simulator.
          SIMULATOR_ID=$(xcrun simctl list devices available | grep iPhone | grep -v unavailable | awk '{print $(NF-1)}' | tr -d '()' | head -n 1)
          echo "Using Simulator ID: $SIMULATOR_ID"

          set -o pipefail && xcodebuild clean build \
            -project AIFitnessCoach.xcodeproj \
            -scheme AIFitnessCoach \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

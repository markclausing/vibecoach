name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Opt-in naar Node.js 24 voor alle JavaScript-actions (GitHub dwingt dit vanaf 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel oudere runs op dezelfde branch zodra een nieuwe push binnenkomt
# (typisch: force-push tijdens PR-iteratie). Bespaart macOS-runner-minuten en
# voorkomt verwarrende status-rollups van oude commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    # Geen `needs:` — draait parallel aan unit-tests voor snelle feedback.
    # `swiftlint --strict` faalt op zowel violations als warnings, zodat het
    # 0-baseline (Epic #46.2 prep-PR) niet stilzwijgend kan eroderen.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        # `macos-latest` runner image bevat SwiftLint niet meer pre-installed
        # (was vroeger wel zo). Brew is wel pre-installed; install duurt ~10s.
        run: brew install swiftlint

      - name: Run SwiftLint
        # `--strict` upgrade warnings naar errors zodat 1 nieuwe violation CI breekt.
        # `github-actions-logging` reporter geeft inline annotations op het PR-diff.
        run: swiftlint --strict --reporter github-actions-logging

  unit-tests:
    name: Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dummy Secrets for Build
        # Kopieer het dummy template naar Secrets.swift zodat het project succesvol compileert.
        # Het mockmodel zorgt er daarna voor dat tests draaien zonder echte API key.
        run: cp AIFitnessCoach/Secrets-template.swift AIFitnessCoach/Secrets.swift

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # Set Build Number is verplaatst naar een Run Script Build Phase die
      # CFBundleVersion at-build-time op `git rev-list --count HEAD` zet — werkt
      # zowel lokaal als in CI, geen handmatige bumps of CI-only mutaties meer.

      - name: Run Unit Tests
        run: |
          # Haal dynamisch de UUID op van de eerste beschikbare iPhone-simulator op de GitHub-runner.
          SIMULATOR_ID=$(xcrun simctl list devices available | grep iPhone | grep -v unavailable | awk '{print $(NF-1)}' | tr -d '()' | head -n 1)
          echo "Using Simulator ID: $SIMULATOR_ID"

          set -o pipefail && xcodebuild test \
            -project AIFitnessCoach.xcodeproj \
            -scheme AIFitnessCoach \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -only-testing:AIFitnessCoachTests \
            -enableCodeCoverage YES \
            -resultBundlePath UnitTests.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Upload xcresult Bundle
        # `if: always()` zodat de bundle ook bij test-falen geüpload wordt voor debugging.
        # `coverage-report`-job downloadt dezelfde bundle om de coverage-markdown te genereren.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-xcresult
          path: UnitTests.xcresult
          retention-days: 7

  ui-tests:
    name: UI Tests
    runs-on: macos-latest
    needs: unit-tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dummy Secrets for Build
        run: cp AIFitnessCoach/Secrets-template.swift AIFitnessCoach/Secrets.swift

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Boot Simulator
        # Expliciete simulator-boot vóór xcodebuild test. Op de macos-latest runner heeft
        # de XCUITest-runner-app (xctrunner) anders regelmatig launch-failures
        # ("ipc/mig server died" / Mach-308) — een ge-boote simulator + warmup geeft 'm
        # tijd om SpringBoard volledig op te starten voor xcodebuild de runner injecteert.
        id: simulator
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available | grep iPhone | grep -v unavailable | awk '{print $(NF-1)}' | tr -d '()' | head -n 1)
          echo "Using Simulator ID: $SIMULATOR_ID"
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

          xcrun simctl boot "$SIMULATOR_ID" 2>&1 || echo "Simulator already booted"
          xcrun simctl bootstatus "$SIMULATOR_ID" -b

      - name: Run UI Tests
        # Investigatie story 46.4: `-parallel-testing-enabled NO` test de hypothese
        # dat de "Clone 2 of iPhone 16 Pro"-xctrunner-clones de bron zijn van de
        # ipc/mig-server-died crashes. `-resultBundlePath` capture de bundle voor
        # post-mortem analyse (per-test crash-reports + activity logs + screenshots).
        run: |
          SIMULATOR_ID="${{ steps.simulator.outputs.id }}"

          set -o pipefail && xcodebuild test \
            -project AIFitnessCoach.xcodeproj \
            -scheme AIFitnessCoach \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -only-testing:AIFitnessCoachUITests \
            -parallel-testing-enabled NO \
            -resultBundlePath UITests.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload UI Tests xcresult Bundle
        # `if: always()` — bundle is juist bij falen het meest waardevol.
        # 14 dagen retentie geeft ruimte voor analyse over meerdere runs.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-tests-xcresult
          path: UITests.xcresult
          retention-days: 14

      - name: Capture CoreSimulator Diagnostics
        # CoreSimulator-logs bevatten de SpringBoard / xctrunner crash-trails. Worden
        # bij ipc/mig-failures vaak geschreven naar ~/Library/Logs/CoreSimulator/.
        if: always()
        run: |
          mkdir -p coresimulator-logs
          cp -R ~/Library/Logs/CoreSimulator coresimulator-logs/ 2>/dev/null || echo "No CoreSimulator logs"
          ls -la coresimulator-logs/ || true

      - name: Upload CoreSimulator Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coresimulator-logs
          path: coresimulator-logs
          retention-days: 14
          if-no-files-found: ignore

  coverage-report:
    name: Coverage Report
    runs-on: macos-latest
    needs: [unit-tests, ui-tests]
    # Draai ook bij een rode UI-tests-job — dan rapporteren we de unit-tests-
    # coverage los (UI bundle ontbreekt, script accepteert dat als single-
    # bundle modus). Cancellation wel respecteren.
    if: ${{ !cancelled() && needs.unit-tests.result == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Unit Tests xcresult
        uses: actions/download-artifact@v4
        with:
          name: unit-tests-xcresult
          path: UnitTests.xcresult

      - name: Download UI Tests xcresult
        # `continue-on-error` voor het zeldzame geval dat UI-tests hard
        # crashten en de upload faalde. Script werkt dan in single-bundle modus.
        uses: actions/download-artifact@v4
        with:
          name: ui-tests-xcresult
          path: UITests.xcresult
        continue-on-error: true

      - name: Generate Coverage Markdown
        # Per-directory split + per-bundle aggregate + combined (max-merge).
        # UI-tests-bundle bevat ook coverage (scheme-default; geen extra
        # `-enableCodeCoverage` flag nodig). Zie `scripts/coverage-report.py`.
        run: |
          xcrun xccov view --report --json UnitTests.xcresult > unit.json
          ARGS="unit-tests=unit.json"
          if [ -d UITests.xcresult ] && [ -n "$(ls UITests.xcresult 2>/dev/null)" ]; then
            xcrun xccov view --report --json UITests.xcresult > ui.json
            ARGS="$ARGS ui-tests=ui.json"
          else
            echo "::warning::UI-tests bundle ontbreekt — single-bundle coverage-rapport"
          fi
          python3 scripts/coverage-report.py coverage.md $ARGS
          cat coverage.md

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.md
          retention-days: 30

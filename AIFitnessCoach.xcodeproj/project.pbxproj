			shellScript = "#!/bin/sh                                                                                                                                \n  # Zet CFBundleVersion op het git-commit-aantal — automatisch, monotoon stijgend,                                                         \n  # geen handmatige bumps. Wijzigt alleen de Info.plist in de gebouwde .app                                                                \n  # (${BUILT_PRODUCTS_DIR}); de bron-Info.plist blijft schoon.                                                                             \n                                                                                                                                           \n  GIT_COUNT=$(git -C \"${PROJECT_DIR}\" rev-list --count HEAD 2>/dev/null)                                                                   \n                                                                                                                                           \n  if [ -z \"$GIT_COUNT\" ]; then                                                                                                             \n    echo \"warning: niet in een git repo, CFBundleVersion blijft staan\"                                                                     \n    exit 0                                                                                                                                 \n  fi                                                                                                                                       \n                                                            \n  INFO_PLIST=\"${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}\"                                                                                     \n  if [ ! -f \"$INFO_PLIST\" ]; then                           \n    echo \"warning: Info.plist niet gevonden op $INFO_PLIST\"                                                                                \n    exit 0                                                                                                                                 \n  fi\n                                                                                                                                           \n  /usr/libexec/PlistBuddy -c \"Set :CFBundleVersion ${GIT_COUNT}\" \"$INFO_PLIST\"\n  echo \"CFBundleVersion gezet op ${GIT_COUNT}\"        \n\n  # Set CFBundleShortVersionString (marketing version) from the latest git tag.\n  # Source of truth = the release-please tag (e.g. v2.1.0); falls back to the\n  # source Info.plist value (2.0.0) for tag-less local/CI builds. Like the\n  # build-number step above, only the built .app Info.plist is modified.\n  GIT_TAG=$(git -C \"${PROJECT_DIR}\" describe --tags --abbrev=0 2>/dev/null)\n  if [ -n \"$GIT_TAG\" ]; then\n    MARKETING=\"${GIT_TAG#v}\"\n    /usr/libexec/PlistBuddy -c \"Set :CFBundleShortVersionString ${MARKETING}\" \"$INFO_PLIST\"\n    echo \"CFBundleShortVersionString set to ${MARKETING} (from tag ${GIT_TAG})\"\n  else\n    echo \"note: no git tag found, CFBundleShortVersionString left at source value\"\n  fi\n";

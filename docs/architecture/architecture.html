<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VibeCoach — Architecture</title>
<style>
  :root {
    --primary: #4D804D;
    --primary-soft: rgba(77, 128, 77, 0.12);
    --primary-line: rgba(77, 128, 77, 0.35);
    --bg: #F2F7EF;
    --bg-elev: #FFFFFF;
    --bg-elev-2: #FAFCF8;
    --text: #1F2A1F;
    --text-muted: #52624F;
    --text-faint: #7A887A;
    --border: rgba(31, 42, 31, 0.09);
    --border-strong: rgba(31, 42, 31, 0.16);
    --shadow: 0 1px 3px rgba(31, 42, 31, 0.04), 0 4px 16px rgba(31, 42, 31, 0.05);
    --shadow-elev: 0 2px 6px rgba(31, 42, 31, 0.06), 0 12px 32px rgba(31, 42, 31, 0.10);
    --radius: 14px;
    --radius-sm: 9px;
    --radius-lg: 20px;
    --transition: 200ms cubic-bezier(0.2, 0.7, 0.2, 1);
    --maxw: 940px;
  }
  [data-theme="moss"]   { --primary: #40703F; --primary-soft: rgba(64,112,63,0.12);    --primary-line: rgba(64,112,63,0.35);   --bg: #F2F7EF; }
  [data-theme="stone"]  { --primary: #6B665F; --primary-soft: rgba(107,102,95,0.12);   --primary-line: rgba(107,102,95,0.35);  --bg: #F5F2EF; }
  [data-theme="mist"]   { --primary: #4F7A9E; --primary-soft: rgba(79,122,158,0.12);   --primary-line: rgba(79,122,158,0.35);  --bg: #F0F5FA; }
  [data-theme="clay"]   { --primary: #9C5836; --primary-soft: rgba(156,88,54,0.12);    --primary-line: rgba(156,88,54,0.35);   --bg: #FAF2EB; }
  [data-theme="sakura"] { --primary: #A15877; --primary-soft: rgba(161,88,119,0.12);   --primary-line: rgba(161,88,119,0.35);  --bg: #FCF2F7; }
  [data-theme="ink"]    { --primary: #384775; --primary-soft: rgba(56,71,117,0.12);    --primary-line: rgba(56,71,117,0.35);   --bg: #F2F2FA; }

  [data-mode="dark"][data-theme="moss"]   { --primary: #85BC85; --primary-soft: rgba(133,188,133,0.14); --primary-line: rgba(133,188,133,0.4);  --bg: #1A211A; --bg-elev: #232B22; --bg-elev-2: #1E2620; --text: #E8EEE6; --text-muted: #A6B4A4; --text-faint: #748573; --border: rgba(232,238,230,0.10); --border-strong: rgba(232,238,230,0.18); --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45); --shadow-elev: 0 2px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.55); }
  [data-mode="dark"][data-theme="stone"]  { --primary: #B3ABA1; --primary-soft: rgba(179,171,161,0.14); --primary-line: rgba(179,171,161,0.4); --bg: #1F1C1A; --bg-elev: #2A2724; --bg-elev-2: #232120; --text: #EEEAE5; --text-muted: #B4ACA3; --text-faint: #837B72; --border: rgba(238,234,229,0.10); --border-strong: rgba(238,234,229,0.18); --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45); --shadow-elev: 0 2px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.55); }
  [data-mode="dark"][data-theme="mist"]   { --primary: #94BCDB; --primary-soft: rgba(148,188,219,0.14); --primary-line: rgba(148,188,219,0.4); --bg: #141A24; --bg-elev: #1E2632; --bg-elev-2: #181F2A; --text: #E2EBF5; --text-muted: #A2B5CB; --text-faint: #718197; --border: rgba(226,235,245,0.10); --border-strong: rgba(226,235,245,0.18); --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45); --shadow-elev: 0 2px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.55); }
  [data-mode="dark"][data-theme="clay"]   { --primary: #D69970; --primary-soft: rgba(214,153,112,0.14); --primary-line: rgba(214,153,112,0.4); --bg: #241712; --bg-elev: #32201A; --bg-elev-2: #2A1A14; --text: #F5E8DC; --text-muted: #CDAC90; --text-faint: #94765D; --border: rgba(245,232,220,0.10); --border-strong: rgba(245,232,220,0.18); --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45); --shadow-elev: 0 2px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.55); }
  [data-mode="dark"][data-theme="sakura"] { --primary: #E1A8BC; --primary-soft: rgba(225,168,188,0.14); --primary-line: rgba(225,168,188,0.4); --bg: #21141A; --bg-elev: #2F1E26; --bg-elev-2: #271820; --text: #F5E2EB; --text-muted: #CFA4B4; --text-faint: #946E7C; --border: rgba(245,226,235,0.10); --border-strong: rgba(245,226,235,0.18); --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45); --shadow-elev: 0 2px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.55); }
  [data-mode="dark"][data-theme="ink"]    { --primary: #859ED1; --primary-soft: rgba(133,158,209,0.14); --primary-line: rgba(133,158,209,0.4); --bg: #121219; --bg-elev: #1C1C28; --bg-elev-2: #18181F; --text: #E2E6F5; --text-muted: #A4ADCC; --text-faint: #737A96; --border: rgba(226,230,245,0.10); --border-strong: rgba(226,230,245,0.18); --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45); --shadow-elev: 0 2px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.55); }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    overflow-x: hidden;
    background: linear-gradient(160deg, var(--bg) 0%, var(--primary-soft) 140%);
    background-attachment: fixed;
    transition: background-color var(--transition), color var(--transition);
  }
  h1, h2, h3, h4 { margin: 0; letter-spacing: -0.01em; }
  p { margin: 0; }
  button { font-family: inherit; }
  a { color: var(--primary); }

  /* ===== Top bar ===== */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 60;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: saturate(150%) blur(18px);
    -webkit-backdrop-filter: saturate(150%) blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 10px max(14px, env(safe-area-inset-left)) 8px;
  }
  .topbar-inner { max-width: var(--maxw); margin: 0 auto; }
  .topbar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 700;
    font-size: 16px;
    min-width: 0;
  }
  .brand-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    flex: none;
    background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 55%, transparent));
    box-shadow: 0 0 0 4px var(--primary-soft);
  }
  .brand-sub { color: var(--text-muted); font-weight: 400; font-size: 14px; }
  .version-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--primary-soft);
    color: var(--primary);
    border: none;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    white-space: nowrap;
  }
  .version-pill .version-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.65; }
  .version-rev { color: var(--text-faint); font-weight: 500; }
  .topbar-spacer { flex: 1; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .theme-picker { display: flex; gap: 5px; padding: 4px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; }
  .theme-swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; transition: transform var(--transition), border-color var(--transition); }
  .theme-swatch.active { border-color: var(--text); transform: scale(1.06); }
  .icon-btn {
    min-width: 44px; height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: color var(--transition), border-color var(--transition);
  }
  .icon-btn:active { border-color: var(--border-strong); }

  /* ===== Primary nav ===== */
  .nav {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
    scroll-snap-type: x proximity;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex: none;
    min-height: 44px;
    padding: 0 16px;
    display: inline-flex; align-items: center; gap: 7px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    scroll-snap-align: start;
    transition: color var(--transition), background var(--transition), border-color var(--transition);
  }
  .nav-tab .nav-emoji { font-size: 16px; }
  .nav-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px var(--primary-soft); }

  /* ===== Main layout ===== */
  main {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 20px max(16px, env(safe-area-inset-left)) 96px max(16px, env(safe-area-inset-right));
  }
  .view { display: none; }
  .view.active { display: block; animation: fade 260ms ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .section-head { margin: 34px 0 14px; }
  .section-head:first-child { margin-top: 6px; }
  .section-title { font-size: 21px; font-weight: 700; }
  .section-sub { color: var(--text-muted); font-size: 15px; margin-top: 4px; max-width: 60ch; }
  .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--primary);
    background: var(--primary-soft);
    padding: 4px 10px; border-radius: 999px;
    margin-bottom: 10px;
  }

  /* ===== Story: hero ===== */
  .hero {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 22px;
    box-shadow: var(--shadow);
  }
  .hero-title { font-size: 30px; font-weight: 800; line-height: 1.15; }
  .hero-summary { font-size: 18px; color: var(--text-muted); margin-top: 12px; line-height: 1.55; }
  .hero-stack { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; }
  .stack-chip {
    font-size: 13px; font-weight: 600;
    padding: 5px 11px; border-radius: 999px;
    background: var(--bg-elev-2); border: 1px solid var(--border); color: var(--text-muted);
  }
  .hero-meta { display: flex; flex-wrap: wrap; gap: 6px 18px; margin-top: 16px; font-size: 13px; color: var(--text-faint); }
  .hero-meta b { color: var(--text-muted); font-weight: 600; }

  /* ===== Chapter cards (big picture) ===== */
  .chapter-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .chapter {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
  }
  .chapter-top { display: flex; align-items: center; gap: 12px; }
  .chapter-icon {
    width: 44px; height: 44px; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: var(--primary-soft); border-radius: 12px;
  }
  .chapter-name { font-size: 18px; font-weight: 700; }
  .chapter-count { font-size: 13px; color: var(--text-faint); font-weight: 500; }
  .chapter-blurb { color: var(--text-muted); font-size: 15px; margin-top: 12px; }
  .chapter-mods { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }

  /* module chip (tappable → detail) */
  .mchip {
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 34px;
    padding: 5px 11px;
    border: 1px solid var(--border-strong);
    background: var(--bg-elev-2);
    color: var(--text);
    border-radius: 999px;
    font-size: 13.5px; font-weight: 600;
    cursor: pointer;
    max-width: 100%;
    transition: border-color var(--transition), background var(--transition);
  }
  .mchip:active { border-color: var(--primary); background: var(--primary-soft); }
  .mchip.more { color: var(--primary); border-style: dashed; }
  .mchip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== Principle cards ===== */
  .principle-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .principle {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-left: 3px solid var(--primary);
    border-radius: var(--radius-sm);
    padding: 15px 16px;
  }
  .principle-title { font-size: 16px; font-weight: 700; }
  .principle-desc { color: var(--text-muted); font-size: 15px; margin-top: 5px; }

  /* ===== Flow cards ===== */
  .flow {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .flow-title { font-size: 17px; font-weight: 700; }
  .flow-trigger { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
  .flow-trigger b { color: var(--text); font-weight: 600; }
  .flow-steps { list-style: none; margin: 14px 0 0; padding: 0; counter-reset: step; }
  .flow-step { position: relative; padding: 0 0 16px 34px; counter-increment: step; }
  .flow-step:last-child { padding-bottom: 0; }
  .flow-step::before {
    content: counter(step);
    position: absolute; left: 0; top: 0;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--primary-soft); color: var(--primary);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .flow-step::after {
    content: ""; position: absolute; left: 11px; top: 26px; bottom: 2px; width: 2px;
    background: var(--border-strong);
  }
  .flow-step:last-child::after { display: none; }
  .flow-action { font-size: 15px; color: var(--text); }
  .flow-mod { margin-top: 5px; }
  .flow-mod .mchip { min-height: 30px; padding: 3px 10px; font-size: 12.5px; }

  /* ===== Map: search + filters ===== */
  .toolbar {
    position: sticky; top: 118px; z-index: 20;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding: 10px 0 8px;
    margin: 0 0 6px;
  }
  .search-input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    font-size: 16px;
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    background: var(--bg-elev);
    color: var(--text);
    outline: none;
  }
  .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .filter-row { display: flex; gap: 7px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .fchip {
    flex: none; min-height: 38px;
    padding: 0 13px;
    display: inline-flex; align-items: center; gap: 7px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text-muted);
    border-radius: 999px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .fchip .fcount { font-size: 12px; opacity: 0.7; font-variant-numeric: tabular-nums; }
  .fchip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ===== Layer block + module cards ===== */
  .layer-block { margin-bottom: 26px; }
  .layer-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .layer-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; padding: 0 7px; border-radius: 8px;
    background: var(--primary); color: #fff; font-size: 13px; font-weight: 700;
  }
  .layer-name { font-size: 18px; font-weight: 700; }
  .layer-desc { color: var(--text-muted); font-size: 14px; margin: 4px 0 14px; }
  .card-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .mcard {
    text-align: left; width: 100%;
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 15px;
    cursor: pointer; color: var(--text);
    display: flex; flex-direction: column; gap: 5px;
    transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  }
  .mcard:active { border-color: var(--primary); box-shadow: var(--shadow); }
  .mcard-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .mcard-name { font-size: 16px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kind-badge {
    flex: none;
    font-size: 11.5px; font-weight: 700; letter-spacing: 0.02em;
    padding: 3px 9px; border-radius: 999px;
    background: var(--primary-soft); color: var(--primary);
    text-transform: lowercase;
  }
  .mcard-desc { color: var(--text-muted); font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .empty-note { color: var(--text-faint); font-size: 15px; padding: 30px 4px; text-align: center; }

  /* ===== Subsystem cards ===== */
  .subsystem {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .subsystem-title { font-size: 17px; font-weight: 700; }
  .subsystem-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .badge-soft { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--bg-elev-2); border: 1px solid var(--border); color: var(--text-muted); }
  .subsystem-desc { color: var(--text-muted); font-size: 15px; }
  .subsystem-mods { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 13px; }

  /* ===== Glossary ===== */
  .glossary-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .gitem { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .gitem summary {
    list-style: none; cursor: pointer;
    padding: 13px 15px; font-size: 15.5px; font-weight: 700;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    min-height: 44px;
  }
  .gitem summary::-webkit-details-marker { display: none; }
  .gitem summary::after { content: "+"; color: var(--primary); font-size: 20px; font-weight: 400; }
  .gitem[open] summary::after { content: "\2013"; }
  .gitem-body { padding: 0 15px 14px; color: var(--text-muted); font-size: 15px; }

  /* term (jargon) button */
  .term {
    border: none; background: none; padding: 0; cursor: pointer;
    color: inherit; font: inherit;
    border-bottom: 1.5px dotted var(--primary);
    color: var(--primary);
  }

  /* ===== Reference view ===== */
  .ref-block {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .ref-block h4 { font-size: 16px; font-weight: 700; }
  .ref-block .meta-line { color: var(--text-faint); font-size: 13px; margin-top: 3px; }
  .ref-block p.body { color: var(--text-muted); font-size: 14.5px; margin-top: 8px; }
  .mini-list { list-style: none; margin: 8px 0 0; padding: 0; }
  .mini-list li { padding: 6px 0 6px 18px; position: relative; color: var(--text-muted); font-size: 14.5px; }
  .mini-list li::before { content: ""; position: absolute; left: 3px; top: 13px; width: 6px; height: 6px; border-radius: 50%; background: var(--primary-line); }
  .stat-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; }
  .stat-value { font-size: 24px; font-weight: 800; }
  .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 600; }
  .stat-sub { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
  .stat-bar { height: 6px; border-radius: 999px; background: var(--primary-soft); margin-top: 8px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: var(--primary); border-radius: 999px; }
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  "flows": [
    {
      "id": "app-launch",
      "name": "App Launch",
      "trigger": "User opens the app",
      "steps": [
        {
          "module": "AIFitnessCoachApp",
          "action": "Init ModelContainer with AppMigrationPlan; fallback on migration error"
        },
        {
          "module": "AppDelegate",
          "action": "Register the BGTaskScheduler handler before return true"
        },
        {
          "module": "AppDelegate",
          "action": "If onboarded: setupEngineA() + scheduleEngineB()"
        },
        {
          "module": "ContentView",
          "action": "Route to OnboardingView or AppTabHostView"
        },
        {
          "module": "AppTabHostView",
          "action": "Trigger TriggerAutoSync (HK + Strava concurrent via async let)"
        }
      ]
    },
    {
      "id": "engine-a",
      "name": "Engine A — Action Trigger",
      "trigger": "New HKWorkout in HealthKit",
      "steps": [
        {
          "module": "HealthKit",
          "action": "HKObserverQuery wakes the app via enableBackgroundDelivery"
        },
        {
          "module": "ProactiveNotificationService",
          "action": "Check whether a goal is in the red (cached in UserDefaults)"
        },
        {
          "module": "ProactiveNotificationService",
          "action": "If yes + cooldown OK: schedule a local push (type=goalRisk)"
        },
        {
          "module": "UNUserNotificationCenter",
          "action": "Show banner; deep-link to the Goals tab"
        }
      ]
    },
    {
      "id": "engine-b",
      "name": "Engine B — Inaction Trigger",
      "trigger": "Daily BGAppRefreshTask",
      "steps": [
        {
          "module": "BGTaskScheduler",
          "action": "Wake the app at the scheduled moment"
        },
        {
          "module": "ProactiveNotificationService",
          "action": "Check: >2 days inactive and a red goal?"
        },
        {
          "module": "ProactiveNotificationService",
          "action": "Schedule an empathetic motivation notification"
        }
      ]
    },
    {
      "id": "workout-ingest",
      "name": "Workout Ingest (HK of Strava)",
      "trigger": "Auto-sync or new HKWorkout",
      "steps": [
        {
          "module": "HealthKitSyncService",
          "action": "Fetch new HK workouts; map to ActivityRecord"
        },
        {
          "module": "FitnessDataService",
          "action": "Fetch Strava activities via ensureValidToken()"
        },
        {
          "module": "ActivityDeduplicator",
          "action": "smartInsert: source-id idempotent → ±5s cross-source check → insert"
        },
        {
          "module": "StravaStreamIngestService",
          "action": "Backfill /streams for records without samples"
        },
        {
          "module": "ActivityDeduplicator",
          "action": "scenePhase: runDedupe on the last 10 records"
        },
        {
          "module": "SessionReclassifier",
          "action": "Reclassify records that just got samples"
        }
      ]
    },
    {
      "id": "workout-analysis",
      "name": "Workout Deep-Dive",
      "trigger": "User opens WorkoutAnalysisView",
      "steps": [
        {
          "module": "WorkoutSampleService",
          "action": "Fetch samples for workoutUUID"
        },
        {
          "module": "SampleResampler",
          "action": "Resample into 5s buckets"
        },
        {
          "module": "WorkoutPatternDetector",
          "action": "Detect 4 patterns (gated on HR zones)"
        },
        {
          "module": "PauseDetector",
          "action": "Find ≥45s pauses for recovery events"
        },
        {
          "module": "WorkoutInsightService",
          "action": "Build context + check cache (goalsFingerprint + weatherFingerprint)"
        },
        {
          "module": "AI-Providers",
          "action": "Gemini call for the 3-sentence Coach analysis"
        },
        {
          "module": "WorkoutInsightCache",
          "action": "Cache the result per workout"
        }
      ]
    },
    {
      "id": "chat-coach",
      "name": "Chat with AI Coach",
      "trigger": "User sends a message in ChatView",
      "steps": [
        {
          "module": "ChatViewModel",
          "action": "Read the API key from the Keychain (UserAPIKeyStore)"
        },
        {
          "module": "VibeScoreContextFormatter",
          "action": "[VIBE SCORE] block"
        },
        {
          "module": "BlueprintContextFormatter",
          "action": "[BLUEPRINT] block with milestones"
        },
        {
          "module": "PreferencesContextFormatter",
          "action": "[PREFERENCES] block"
        },
        {
          "module": "WorkoutHistoryContextBuilder",
          "action": "[RECENT WORKOUTS] block with patterns"
        },
        {
          "module": "GenerativeModelProtocol",
          "action": "Stream the response from the chosen provider"
        }
      ]
    },
    {
      "id": "strava-oauth",
      "name": "Strava OAuth",
      "trigger": "User taps Connect Strava",
      "steps": [
        {
          "module": "StravaAuthService",
          "action": "Build the authorize URL with a random state UUID (CSRF)"
        },
        {
          "module": "Strava-API",
          "action": "User authorizes; redirect with code + state"
        },
        {
          "module": "StravaAuthService",
          "action": "Validate state against the callback URL"
        },
        {
          "module": "vibecoach-proxy",
          "action": "POST /oauth/strava/exchange (X-Client-Token header)"
        },
        {
          "module": "TokenStore",
          "action": "Store tokens in the Keychain"
        }
      ]
    },
    {
      "id": "byok-migration",
      "name": "BYOK Migration (one-time)",
      "trigger": "First launch after the C-02 update",
      "steps": [
        {
          "module": "AIFitnessCoachApp",
          "action": "init() calls UserAPIKeyStore.migrateFromUserDefaultsIfNeeded()"
        },
        {
          "module": "UserAPIKeyStore",
          "action": "Read the legacy UserDefaults key; write to the Keychain; clear the UserDefaults entry"
        }
      ]
    },
    {
      "id": "schema-migration",
      "name": "SwiftData Schema Migration",
      "trigger": "App launch with an old DB version",
      "steps": [
        {
          "module": "AIFitnessCoachApp",
          "action": "ModelContainer(for: SchemaV3, migrationPlan: AppMigrationPlan)"
        },
        {
          "module": "AppMigrationPlan",
          "action": "Execute staged stages V1→V2→V3"
        },
        {
          "module": "AIFitnessCoachApp",
          "action": "On failure: log + delete the corrupt store + fresh V3 + UserDefaults flag for a UI message"
        }
      ]
    },
    {
      "id": "release",
      "name": "Release & Versioning (Epic #63)",
      "trigger": "Push to main (continuous) + maintainer merging the Release PR (cut)",
      "steps": [
        {
          "module": "maintainer",
          "action": "Squash & merge a feature PR with a Conventional-Commit title (feat: / fix: / …)"
        },
        {
          "module": "release-please",
          "action": "On push to main: recompute the next semver from commit titles since the last tag; create/update the rolling Release PR 'chore(main): release X.Y.Z' + changelog"
        },
        {
          "module": "maintainer",
          "action": "When ready to ship: merge the Release PR — this is the only moment the marketing version moves"
        },
        {
          "module": "release-please",
          "action": "Create git tag vX.Y.Z + GitHub Release + update .release-please-manifest.json"
        },
        {
          "module": "Build Phase",
          "action": "Subsequent builds stamp CFBundleShortVersionString from git describe --tags (fallback: source Info.plist). CFBundleVersion keeps auto-incrementing per commit independently."
        }
      ]
    }

  "testing": {
    "summary": "Pure-Swift logic in Services/Models/ViewModels helpers gets unit-test coverage; happy-path UI flows via XCUITest. Deliberately not everything: trivial getters, view-layer orchestration without an injection seam, and simulator-sandbox-unreachable frameworks remain untested.",
    "docRef": "CLAUDE.md §6 — Testing Policy",
    "policy": [
      {
        "id": "test-yes",
        "title": "What TO test",
        "items": [
          "Pure-Swift logic in Services/, Models/, ViewModels/ helpers (classifiers, calculators, formatters, schedulers)",
          "Schema migrations with file-backed seed stores (in-memory does not work for migration paths)",
          "Domain rules with edge cases: HR-zone boundaries, injury-keyword detection, DST transitions, dedupe heuristics",
          "Happy-path UI flows via XCUITest: onboarding, navigation to each tab, creating a goal"
        ]
      },
      {
        "id": "test-no",
        "title": "What NOT to test",
        "items": [
          "Trivial getters/setters or SwiftData boilerplate",
          "View-layer orchestration without a clean injection seam (concurrent sync, async let flows)",
          "iOS framework things that do not work in the simulator sandbox (Keychain entitlements, BGTaskScheduler timing)"
        ]
      },
      {
        "id": "testability",
        "title": "Safeguarding testability",
        "items": [
          "Keep pure-Swift helpers free of AppStorage/UserDefaults — caller injects state via parameters",
          "Mocking for UI tests via UITestMockEnvironment.setup() (gated on -UITesting + #if DEBUG)",
          "Test-only bypasses in production code only behind a -UITesting check + comment"
        ]
      }

<script>
(function () {

  // ===== Glossary / jargon (viewer copy — plain-English explanations) =====

    'service': 'Service — a behind-the-scenes worker that does one job: syncing data, doing a calculation, or talking to an outside API.',
    'view': 'View — a screen, or a piece of a screen, that you actually see and tap.',
    'viewmodel': 'ViewModel — prepares and shapes data for a screen, so the screen itself stays simple.',
    'model': '@Model — a kind of data the app saves on your device (a goal, a workout, a preference). SwiftData stores these.',
    'formatter': 'Formatter — turns raw numbers and facts into the exact text the AI coach reads in its prompt.',
    'helper': 'Helper — a small, reusable piece of logic that other parts of the app lean on.',
    'store': 'Store — safely holds one specific thing, like your API key or a login token.',
    'validator': 'Validator — checks that data is correct and complete before the app trusts it.',
    'parser': 'Parser — reads raw text or data from outside and turns it into something structured.',
    'schema-snapshot': 'Schema snapshot — a frozen picture of how saved data was shaped in an earlier app version, used to upgrade safely.',
    'migration': 'Migration — safely upgrades the data already saved on your device when its shape changes in a new version.',
    'framework': 'Framework — a large building block Apple provides, such as HealthKit or background tasks.',
    'api': 'API — an outside service the app talks to over the internet (Strava, the weather service, an AI provider).',
    'infrastructure': 'Infrastructure — plumbing that supports the app rather than a user-facing feature.',
    'entry': 'Entry point — where the app starts running when you open it.',
    'delegate': 'Delegate — a helper the system calls at key moments in the app life-cycle.',
    'monitor': 'Monitor — keeps an eye on something and reacts when it changes.',
    'banner': 'Banner — a small message strip shown at the top of a screen.',
    'test-infra': 'Test infrastructure — fake data and stand-ins that let automated tests run without the real internet.',
    'byok': 'BYOK — "Bring Your Own Key". You supply your own AI provider key; it is stored safely on your device, never on our servers.',
    'singleton': 'Singleton — a single shared instance that the whole app reuses, instead of making many copies.',
    'healthkit': 'HealthKit — Apple’s on-device health store: workouts, heart rate, sleep, HRV.',
    'swiftdata': 'SwiftData — Apple’s on-device database. It saves your goals, workouts and preferences locally.',
    'swiftui': 'SwiftUI — Apple’s modern toolkit for building the screens you see.',
    'keychain': 'Keychain — the encrypted vault iOS uses for secrets like passwords and API keys.',
    'oauth': 'OAuth — the secure "log in with Strava" handshake that never shares your password with the app.',
    'layer': 'Layer — one horizontal slice of the app, from the screens at the top down to storage at the bottom.',
    'subsystem': 'Subsystem — a feature that cuts across several layers to get one job done end to end.',
    'flow': 'Flow — a step-by-step chain showing what happens after something triggers it.',
    'pr': 'PR (pull request) — a proposed set of changes, opened for review before it becomes part of the app.',
    'squash': 'Squash & merge — combining all the small commits on a branch into one tidy commit on the main line.',
    'dag': 'DAG — steps wired so some run at the same time and others must wait for what they depend on.',
    'conventional-commits': 'Conventional Commits — a small format for commit titles (feat:, fix:, docs:…) that a tool reads to decide the next version.',
    'semver': 'Semver — version numbers like 2.1.0: major.minor.patch, each part signalling how big the change is.',
    'ci': 'CI (continuous integration) — automated checks that run on every change to catch problems early.',
    'main': 'main — the primary branch that always holds the shippable version of the app.',
    'release-please': 'release-please — a tool that watches commit titles and keeps a ready-to-merge “release” PR up to date.',
    'branch': 'Branch — a private copy of the code where a change is built, before it merges back.'
  };
  // extra kinds we may meet, default explanation
  function termKey(s) { return String(s || '').toLowerCase(); }

  // ===== term popover =====
  var termPop = document.getElementById('termPop');
  var termTitle = document.getElementById('termTitle');
  var termBody = document.getElementById('termBody');
  function showTerm(key, label) {
    var def = TERMS[termKey(key)];
    termTitle.textContent = label || key || '';
    termBody.textContent = def || (tagsMap[key] || 'No plain-English note for this term yet.');
    termPop.classList.add('open');
  }
  function hideTerm() { termPop.classList.remove('open'); }
  document.getElementById('termClose').addEventListener('click', hideTerm);
  document.addEventListener('click', function (e) {
    if (termPop.classList.contains('open') && !termPop.contains(e.target) && !(e.target.classList && e.target.classList.contains('term'))) hideTerm();
  });
  // helper: make a <button class="term"> for a jargon word
  function term(label, key) {
    return '<button class="term" type="button" data-term="' + esc(termKey(key || label)) + '" data-label="' + esc(label) + '">' + esc(label) + '</button>';
  }
  document.addEventListener('click', function (e) {
    var t = e.target.closest ? e.target.closest('.term') : null;
    if (t) { e.stopPropagation(); showTerm(t.dataset.term, t.dataset.label); }
  });

  // ===== module chip / detail =====
  function mchip(id, opts) {
    opts = opts || {};
    var known = !!byId[id];
    var cls = 'mchip' + (opts.more ? ' more' : '');
    return '<button class="' + cls + '" type="button" data-mod="' + esc(id) + '"' + (known ? '' : ' data-extern="1"') + '>' +
      '<span class="mchip-name">' + esc(id) + '</span></button>';
  }
  document.addEventListener('click', function (e) {
    var b = e.target.closest ? e.target.closest('[data-mod]') : null;
    if (b && !b.dataset.extern) openDetail(b.dataset.mod);
  });

  // ===== Detail sheet (Level 3) =====
  var scrim = document.getElementById('scrim');
  var sheet = document.getElementById('sheet');
  var sheetBody = document.getElementById('sheetBody');
  function closeDetail() { sheet.classList.remove('open'); scrim.classList.remove('open'); }

  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { closeDetail(); hideTerm(); } });

  function linkRow(id) {
    var target = byId[id];
    if (!target) return '<button class="detail-link" disabled type="button">' + esc(id) + '<span class="ll-kind">external</span></button>';
    return '<button class="detail-link" type="button" data-mod="' + esc(id) + '">' + esc(id) + '<span class="ll-kind">' + esc(target.kind || '') + '</span></button>';
  }

  function openDetail(id) {
    var m = byId[id];
    if (!m) return;
    var layer = layerById[m.layer];
    var uses = (m.uses || []);
    var usedBy = (dependents[id] || []);
    document.getElementById('detailKind').innerHTML = term(m.kind || 'module', m.kind || '');
    document.getElementById('sheetName').textContent = m.id;
    document.getElementById('detailLayer').textContent = layer ? layer.name : (m.layer || '');
    var parts = [];
    if (m.description) parts.push('<p class="detail-desc">' + esc(m.description) + '</p>');
    if (m.file) parts.push('<div class="detail-section"><div class="detail-label">File</div><div class="detail-file">' + esc(m.file) + '</div></div>');
    if ((m.tags || []).length) {
      parts.push('<div class="detail-section"><div class="detail-label">Tags / epics</div><div class="chip-list">' +
        m.tags.map(function (t) { return '<button class="tag-chip term" type="button" data-term="' + esc(t) + '" data-label="' + esc(t) + '">' + esc(t) + '</button>'; }).join('') +
        '</div></div>');
    }
    if (uses.length) {
      parts.push('<div class="detail-section"><div class="detail-label">Builds on (' + uses.length + ')</div><div class="detail-links">' +
        uses.map(linkRow).join('') + '</div></div>');
    }
    if (usedBy.length) {
      parts.push('<div class="detail-section"><div class="detail-label">Used by (' + usedBy.length + ')</div><div class="detail-links">' +
        usedBy.map(linkRow).join('') + '</div></div>');
    }
    if (!uses.length && !usedBy.length) {
      parts.push('<div class="detail-section"><p class="stat-sub">No recorded dependencies in either direction.</p></div>');
    }
    sheetBody.innerHTML = parts.join('');
    // patch the tag term buttons to resolve from tagsMap on tap
    sheet.classList.add('open'); scrim.classList.add('open');
    sheetBody.scrollTop = 0;
  }
  // tag chips inside the sheet use tagsMap as their definition source
  sheetBody.addEventListener('click', function (e) {
    var t = e.target.closest ? e.target.closest('.tag-chip') : null;

  });

  (function () {
    var pill = document.getElementById('versionPill');
    var v = meta.appVersion || meta.version || '?';
    var rev = meta.docRevision ? ('rev ' + meta.docRevision) : '';
    pill.innerHTML = '<span class="version-dot"></span><span>v' + esc(v) + '</span>' + (rev ? '<span class="version-rev">· ' + esc(rev) + '</span>' : '');
    var title = ['App version ' + v + (meta.appVersionSource ? ' (' + meta.appVersionSource + ')' : '')];
    if (meta.docRevision) title.push('Doc revision ' + meta.docRevision);
    if (meta.lastUpdated) title.push('Last updated ' + meta.lastUpdated);
    pill.title = title.join('\n');
    pill.addEventListener('click', function () {
      showTerm('__version__', 'Version');
      termTitle.textContent = 'v' + v + (rev ? ' · ' + rev : '');
      termBody.textContent = title.slice(1).join(' · ') + (meta.versioningPolicy ? '\n\n' + meta.versioningPolicy : '');
      termBody.style.whiteSpace = 'pre-wrap';
    });
  })();

  // ===== Theme + mode =====
  var themePicker = document.getElementById('themePicker');
  (styleGuide.themes || []).forEach(function (t) {
    if (!t || !t.id) return;

  });

    document.body.dataset.theme = id;

    document.querySelectorAll('.theme-swatch').forEach(function (s) { s.classList.toggle('active', s.dataset.theme === id); });

  var CHAPTERS = [

  // inline-SVG dependency graph: level = longest path from a root; columns = levels
  function ciDag(jobs) {
    if (!jobs.length) return '';
    var uid = 'dag' + (++dagUid);
    var jById = {}; jobs.forEach(function (j) { jById[j.id] = j; });
    var lvl = {};
    function level(id, seen) {
      if (lvl[id] != null) return lvl[id];
      seen = seen || {};
      if (seen[id]) return 0;            // cycle guard (defensive)
      seen[id] = 1;
      var j = jById[id];
      var needs = ((j && j.needs) || []).filter(function (n) { return jById[n]; });
      var v = needs.length ? Math.max.apply(null, needs.map(function (n) { return level(n, seen); })) + 1 : 0;
      lvl[id] = v; return v;
    }
    jobs.forEach(function (j) { level(j.id); });
    var cols = {};
    jobs.forEach(function (j) { (cols[lvl[j.id]] = cols[lvl[j.id]] || []).push(j); });
    var levels = Object.keys(cols).map(Number).sort(function (a, b) { return a - b; });
    var NW = 150, NH = 46, COLGAP = 58, ROWGAP = 16, PADX = 6, PADY = 20;
    var maxRows = Math.max.apply(null, levels.map(function (L) { return cols[L].length; }));
    var W = PADX * 2 + levels.length * NW + (levels.length - 1) * COLGAP;
    var H = PADY + maxRows * (NH + ROWGAP);
    var pos = {};
    levels.forEach(function (L, ci) {
      var arr = cols[L];
      var colX = PADX + ci * (NW + COLGAP);
      var totalH = arr.length * (NH + ROWGAP) - ROWGAP;
      var startY = PADY + (maxRows * (NH + ROWGAP) - ROWGAP - totalH) / 2;
      arr.forEach(function (j, ri) { pos[j.id] = { x: colX, y: startY + ri * (NH + ROWGAP), lvl: L }; });
    });
    var edges = '';
    jobs.forEach(function (j) {
      (j.needs || []).forEach(function (n) {
        if (!pos[n]) return;
        var p = pos[n], c = pos[j.id];
        var x1 = p.x + NW, y1 = p.y + NH / 2, x2 = c.x, y2 = c.y + NH / 2, mx = (x1 + x2) / 2;
        edges += '<path class="dag-edge" d="M' + x1 + ' ' + y1 + ' C ' + mx + ' ' + y1 + ' ' + mx + ' ' + y2 + ' ' + x2 + ' ' + y2 + '" marker-end="url(#' + uid + ')"/>';
      });
    });
    var nodes = jobs.map(function (j) {
      var p = pos[j.id];
      return '<g class="dag-node dag-node-lvl' + p.lvl + '">' +
        '<rect class="dag-node-box" x="' + p.x + '" y="' + p.y + '" width="' + NW + '" height="' + NH + '" rx="10"/>' +
        '<text class="dag-node-label" x="' + (p.x + NW / 2) + '" y="' + (p.y + NH / 2 + 4) + '" text-anchor="middle">' + esc(j.name) + '</text></g>';
    }).join('');
    var stageLabels = levels.map(function (L, ci) {
      var colX = PADX + ci * (NW + COLGAP) + NW / 2;
      return '<text class="dag-stage-label" x="' + colX + '" y="11" text-anchor="middle">' + (L === 0 ? 'runs first' : 'then') + '</text>';
    }).join('');
    return '<div class="dev-dag-wrap"><svg class="dev-dag" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="CI job dependency graph — arrows point from a job to the jobs that wait for it">' +
      '<defs><marker id="' + uid + '" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path class="dag-arrow" d="M0 0 L8 4 L0 8 z"/></marker></defs>' +
      stageLabels + edges + nodes + '</svg></div>';
  }

  // Block 2 — the CI / release pipeline
  function devCI(ci) {
    if (!ci || typeof ci !== 'object') return '';
    var jobs = Array.isArray(ci.jobs) ? ci.jobs : [];
    var iosJobs = jobs.filter(function (j) { return j.workflow === 'ios-ci'; });
    var codeqlJobs = jobs.filter(function (j) { return j.workflow === 'codeql'; });
    var out = '<div class="dev-block">' + devHead(ci.title || 'The CI pipeline', ci.intro ? esc(ci.intro) : '');
    if ((ci.workflows || []).length) {
      out += '<div class="doc-grid" style="margin-bottom:6px">' + ci.workflows.map(function (w) {
        return '<div class="doc-card"><span class="doc-ico">⚙️</span><div class="branch-main"><div class="doc-file">' + esc(w.name) + '</div><div class="doc-scope">' + esc(w.blurb || '') + '</div></div></div>';
      }).join('') + '</div>';
    }
    if (iosJobs.length) {
      out += '<div class="doc-subhead">iOS CI — what blocks what</div>' + ciDag(iosJobs) +
        '<ul class="mini-list">' + iosJobs.map(function (j) {
          var waits = (j.needs || []).length ? ' <span class="stat-sub" style="display:inline">(waits for ' + esc(j.needs.join(', ')) + ')</span>' : ' <span class="stat-sub" style="display:inline">(runs first)</span>';
          return '<li><b>' + esc(j.name) + '</b>' + (j.blocks ? ' — ' + esc(j.blocks) : '') + waits + '</li>';
        }).join('') + '</ul>';
    }
    if (codeqlJobs.length) {
      out += '<div class="doc-subhead">CodeQL — security scan (both run in parallel)</div>' + ciDag(codeqlJobs);
    }
    var r = ci.release;
    if (r && typeof r === 'object') {
      out += '<div class="doc-subhead">' + esc(r.title || 'How a release is cut') + '</div>';
      if (r.intro) out += '<p class="dev-intro">' + esc(r.intro) + '</p>';
      var vcards = '';
      if (r.buildNumber) vcards += '<div class="stat-card"><div class="stat-label">' + esc(r.buildNumber.label || 'Build number') + '</div><p class="body" style="margin-top:4px">' + esc(r.buildNumber.detail || '') + '</p></div>';
      if (r.marketingVersion) vcards += '<div class="stat-card"><div class="stat-label">' + esc(r.marketingVersion.label || 'Version') + '</div><p class="body" style="margin-top:4px">' + esc(r.marketingVersion.detail || '') + '</p></div>';
      if (vcards) out += '<div class="stat-row" style="grid-template-columns:1fr 1fr;margin-bottom:10px">' + vcards + '</div>';
      if ((r.steps || []).length) {
        out += '<div class="dev-flow-row">' + r.steps.map(function (s, i) {
          return (i > 0 ? '<div class="dev-flow-arrow">→</div>' : '') +
            '<div class="dev-flow-card"><div class="dfc-title">' + esc(s.title) + '</div><div class="dfc-detail">' + esc(s.detail || '') + '</div></div>';
        }).join('') + '</div>';
      }
      if ((r.bumpRules || []).length) {
        out += '<div class="scroll-x" style="margin-top:12px"><table class="ref-table"><thead><tr><th>Commit type</th><th>Version bump</th><th>Example</th></tr></thead><tbody>' +
          r.bumpRules.map(function (b) { return '<tr><td class="code-inline">' + esc(b.type) + '</td><td><b>' + esc(b.bump) + '</b></td><td class="code-inline">' + esc(b.example) + '</td></tr>'; }).join('') +
          '</tbody></table></div>';
      }
    }
    return out + '</div>';
  }

  // Block 3 — branching & PR agreements
  function devBranching(b) {
    if (!b || typeof b !== 'object') return '';
    var types = (b.types || []).map(function (t) {
      return '<div class="branch-card"><span class="branch-ico">' + esc(t.icon || '') + '</span><div class="branch-main">' +
        '<div class="branch-pattern">' + esc(t.pattern) + '</div><div class="branch-use">' + esc(t.use || '') + '</div></div></div>';
    }).join('');
    var rules = (b.rules || []).map(function (r) {
      return '<div class="ref-block"><h4>' + esc(r.title) + '</h4><p class="body">' + esc(r.detail || '') + '</p></div>';
    }).join('');
    var st = b.stackedPRs, stack = '';
    if (st && typeof st === 'object') {
      var bars = (st.stack || []).map(function (s) {
        return '<div class="stack-bar"><span class="sb-label">' + esc(s.label) + '</span><span class="sb-note">' + esc(s.note || '') + '</span></div>';
      }).join('');
      stack = '<div class="stack-inset"><h4>' + esc(st.title || 'Stacked PRs') + '</h4><p class="body">' + esc(st.detail || '') + '</p>' +
        (bars ? '<div class="stack-bars">' + bars + '</div><div class="stack-updir">↑ merge bottom-up, delete each branch after it merges</div>' : '') + '</div>';
    }
    return '<div class="dev-block">' + devHead(b.title || 'Branching & PR agreements', b.intro ? esc(b.intro) : '') +
      '<div class="branch-grid">' + types + '</div>' +
      (rules ? '<div style="margin-top:12px">' + rules + '</div>' : '') + stack + '</div>';
  }

  // Block 4 — the documentation system
  function devDocumentation(d) {
    if (!d || typeof d !== 'object') return '';
    function docCard(x) {
      return '<div class="doc-card"><span class="doc-ico">' + esc(x.icon || '') + '</span><div class="branch-main">' +
        '<div class="doc-file">' + esc(x.file) + '</div><div class="doc-scope">' + esc(x.scope || '') + '</div>' +
        (x.reader ? '<span class="doc-reader">' + esc(x.reader) + '</span>' : '') + '</div></div>';
    }
    var out = '<div class="dev-block">' + devHead(d.title || 'The documentation system', d.intro ? esc(d.intro) : '');
    if ((d.sources || []).length) out += '<div class="doc-subhead">Source of truth — hand-written</div><div class="doc-grid">' + d.sources.map(docCard).join('') + '</div>';
    if ((d.derived || []).length) out += '<div class="doc-subhead">Derived — generated from the source</div><div class="doc-grid">' + d.derived.map(docCard).join('') + '</div>';
    if (d.syncNote) out += '<div class="doc-sync"><span class="code-inline">architecture.json</span> <b>→ injected into →</b> <span class="code-inline">architecture.html</span><br>' + esc(d.syncNote) + '</div>';
    if ((d.dodChecklist || []).length) {
      out += '<details class="dev-details"><summary>Definition of Done — the sync checklist</summary><div class="dd-body"><ul class="dod-list">' +
        d.dodChecklist.map(function (i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul></div></details>';
    }
    var rf = d.roadmapFlow;
    if (rf && typeof rf === 'object') {
      out += '<div class="doc-subhead">' + esc(rf.title || 'Roadmap → archive') + '</div>';
      if (rf.intro) out += '<p class="dev-intro">' + esc(rf.intro) + '</p>';
      out += '<div class="dev-flow-row">' + (rf.stages || []).map(function (s, i) {
        return (i > 0 ? '<div class="dev-flow-arrow">→</div>' : '') +
          '<div class="dev-flow-card"><div class="dfc-title">' + esc(s.status || '') + ' ' + esc(s.label) + '</div><div class="dfc-detail">' + esc(s.detail || '') + '</div></div>';
      }).join('') +
        '<div class="dev-flow-arrow">→</div><div class="dev-flow-card"><div class="dfc-title">📦 Archive</div><div class="dfc-detail">ROADMAP-archive.md — the full history, read on demand.</div></div></div>';
    }
    return out + '</div>';
  }

  function renderHowItsBuilt() {
    var root = document.getElementById('view-howbuilt');
    var dev = (DATA.development && typeof DATA.development === 'object') ? DATA.development : null;
    var html = devHead('How this project is built',
      dev && dev.summary ? esc(dev.summary) : 'The people, pipeline and conventions behind the app.');
    if (dev) {
      html += devJargonStrip();
      html += devCollaboration(dev.collaboration);
      html += devCI(dev.ci);
      html += devBranching(dev.branching);
      html += devDocumentation(dev.documentation);
      // deeper reference sits below the visual process story
      var deep = refTesting() + refAgent();
      if (deep) html += '<div class="section-head"><div class="section-title">Go deeper</div>' +
        '<p class="section-sub">The full testing strategy, the agent rules, and the lessons learned along the way.</p></div>' + deep;
    } else {
      // Defensive: an older JSON snapshot without a development object still renders.
      html += refTesting() + refCI() + refAgent();
    }
    root.innerHTML = html;
    if (!root.innerHTML.trim()) root.innerHTML = '<p class="empty-note">No material recorded.</p>';
  }

  // ===== Initial render =====
  try { renderStory(); } catch (e) { document.getElementById('view-story').innerHTML = '<p class="empty-note">Could not render the story.</p>'; }
  try { renderMap(); } catch (e) {}
  try { renderFlows(); } catch (e) {}
  try { renderHowItsBuilt(); } catch (e) { document.getElementById('view-howbuilt').innerHTML = '<p class="empty-note">Could not render this view.</p>'; }
})();
</script>
</body>
</html>

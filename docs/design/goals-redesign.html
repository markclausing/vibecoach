<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VibeCoach · Goals redesign</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap");

:root, [data-mode="light"] {
  --accent:#6B8E5A; --accent-soft:#D8E3CF; --accent-deep:#4A6A3E;
  --bg:#F7F5F1; --surface:#FFFFFF; --surface-alt:#F1EEE8;
  --divider:rgba(30,26,22,0.08); --border:rgba(30,26,22,0.12);
  --fg-primary:#1E1A16; --fg-secondary:#5C554D; --fg-tertiary:#8F877D; --fg-on-accent:#FFFFFF;
  --warn:#C49A5A; --warn-soft:#F3E8D5; --warn-fg:#7A5C2F;
  --danger:#B8695E; --danger-soft:#F1D9D4; --danger-fg:#7A3F37;
  --info:#6F8BA3; --info-soft:#DCE6EE; --info-fg:#3F5669;
  --track:rgba(30,26,22,0.08);
  --shadow-sm:0 1px 2px rgba(30,26,22,0.04); --shadow-md:0 4px 14px rgba(30,26,22,0.06);
}
[data-mode="dark"] {
  --accent:#9FBA8E; --accent-soft:rgba(159,186,142,0.16); --accent-deep:#C5D4B5;
  --bg:#1F1C18; --surface:#2A2621; --surface-alt:#322D27;
  --divider:rgba(255,246,230,0.08); --border:rgba(255,246,230,0.12);
  --fg-primary:#F2EEE6; --fg-secondary:#B5AEA2; --fg-tertiary:#7A7469; --fg-on-accent:#14120F;
  --warn:#D9B888; --warn-soft:rgba(196,154,90,0.16); --warn-fg:#D9B888;
  --danger:#D9A59B; --danger-soft:rgba(184,105,94,0.16); --danger-fg:#D9A59B;
  --info:#9EB6C7; --info-soft:rgba(111,139,163,0.16); --info-fg:#9EB6C7;
  --track:rgba(255,246,230,0.10);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3); --shadow-md:0 4px 14px rgba(0,0,0,0.35);
}
html, body, #root { margin:0; padding:0; min-height:100%; }
* { box-sizing:border-box; }
body { background:#EAE7DF; font-family:'Inter',-apple-system,system-ui,sans-serif; }
body[data-canvas="dark"] { background:#141210; }

.page { padding:36px 24px 72px; }
.page-head { max-width:1400px; margin:0 auto 26px; }
.page-title { font-size:26px; font-weight:700; letter-spacing:-0.02em; margin:0; color:#1E1A16; }
body[data-canvas="dark"] .page-title { color:#F2EEE6; }
.page-sub { font-size:13.5px; line-height:1.5; color:#5C554D; margin:6px 0 0; max-width:640px; }
body[data-canvas="dark"] .page-sub { color:#A8A196; }
.mode-toggle { display:inline-flex; gap:2px; padding:3px; border-radius:999px; background:#fff; margin-top:14px; box-shadow:0 1px 2px rgba(0,0,0,.06); }
body[data-canvas="dark"] .mode-toggle { background:#2A2621; }
.mode-toggle button { border:0; background:transparent; cursor:pointer; padding:6px 14px; border-radius:999px; font:inherit; font-size:12px; font-weight:600; color:#5C554D; }
body[data-canvas="dark"] .mode-toggle button { color:#B5AEA2; }
.mode-toggle button.active { background:#6B8E5A; color:#fff; }

.row-frames { display:flex; gap:34px; justify-content:center; flex-wrap:wrap; max-width:1400px; margin:0 auto; }
.frame-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
.frame-label { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#8F877D; }

.iphone { width:322px; height:660px; border-radius:44px; background:#0A0A0B; padding:6px; box-shadow:0 40px 60px rgba(0,0,0,.18); position:relative; }
.screen { width:100%; height:100%; border-radius:38px; overflow:hidden; position:relative; background:var(--bg); }
.island { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:98px; height:27px; border-radius:999px; background:#000; z-index:50; }
.statusbar { position:absolute; top:0; left:0; right:0; height:50px; display:flex; justify-content:space-between; align-items:center; padding:19px 26px 0; z-index:20; font-size:13px; font-weight:600; color:var(--fg-primary); }
.scroll { position:absolute; inset:0; padding-top:50px; overflow:auto; }
.scroll::-webkit-scrollbar{ display:none; }
.tabbar { position:absolute; left:0; right:0; bottom:0; height:64px; padding-bottom:14px; display:flex; z-index:40; background:color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter:blur(16px); border-top:.5px solid var(--divider); }
.tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:10px; font-weight:600; color:var(--fg-tertiary); }
.tab.active { color:var(--accent); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-file="goals.jsx">

// ── Icons ──────────────────────────────────────────────────────
const I = (d, extra) => ({ size=20, style, sw=1.9 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>
    {typeof d === 'string' ? <path d={d}/> : d}{extra}
  </svg>
);
const IcRun    = I('M13 4a1.5 1.5 0 1 0 0-.01M7 21l2.5-5 3-2 2 3 3 1M9 12l1.5-4 3 1 2 2.5');
const IcChev   = I('M9 6l6 6-6 6');
const IcChevD  = I('M6 9l6 6 6-6');
const IcChevU  = I('M6 15l6-6 6 6');
const IcCheck  = I('M5 12l4 4L19 7');
const IcCheckC = I(<g><circle cx="12" cy="12" r="9"/><path d="M8.5 12l2.5 2.5 4.5-5"/></g>);
const IcBolt   = I('M13 2L4 14h7l-1 8 9-12h-7l1-8z');
const IcRuler  = I(<g><path d="M4 8h16v8H4z"/><path d="M8 8v3M12 8v4M16 8v3"/></g>);
const IcFlag   = I('M5 21V4M5 4h11l-2.5 3.5L16 11H5');
const IcTrophy = I('M7 4h10v3a5 5 0 0 1-10 0zM7 4H4v1a3 3 0 0 0 3 3M17 4h3v1a3 3 0 0 1-3 3M9 20h6M12 15v5');
const IcPlus   = I('M12 5v14M5 12h14');
const IcCal    = I(<g><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></g>);
const IcInfo   = I(<g><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></g>);
const IcTrash  = I('M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13');
const IcTarget = I(<g><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/></g>);
const IcHome   = I('M3 11l9-8 9 8v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z');
const IcMsg    = I('M21 15a3 3 0 0 1-3 3H8l-5 3V6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3z');
const IcUser   = I(<g><circle cx="12" cy="8" r="3.5"/><path d="M5 21a7 7 0 0 1 14 0"/></g>);
const IcGear   = I(<g><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M22 12h-3M5 12H2M19 5l-2 2M7 17l-2 2M19 19l-2-2M7 7 5 5"/></g>);
const IcTrend  = I('M3 17l6-6 4 4 8-8M15 7h6v6');

// ── Statusbar + tabbar chrome ──────────────────────────────────
function Chrome({ children, active='Goals' }) {
  const tabs=[['Overview',IcHome],['Goals',IcTarget],['Coach',IcMsg],['Memory',IcUser],['Settings',IcGear]];
  return (
    <div className="screen">
      <div className="island"/>
      <div className="statusbar">
        <span>15:40</span>
        <span style={{display:'inline-flex',gap:5,alignItems:'center'}}>
          <svg width="15" height="10" viewBox="0 0 15 10"><path d="M1 6l6-5 6 5-2 .6L7 3 3 6.6z" fill="currentColor" opacity=".85"/></svg>
          <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0" y="1.5" width="18" height="7" rx="2" fill="none" stroke="currentColor" strokeOpacity=".4"/><rect x="1.5" y="3" width="14" height="4" rx="1" fill="currentColor"/></svg>
        </span>
      </div>
      {children}
      <div className="tabbar">
        {tabs.map(([l,Ic]) => (
          <div key={l} className={'tab'+(l===active?' active':'')}>
            <Ic size={21} sw={l===active?2.1:1.8}/>{l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Reusable bits ──────────────────────────────────────────────
function Section({ children, action }) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'2px 20px 8px'}}>
      <span style={{fontSize:11,fontWeight:700,letterSpacing:.9,textTransform:'uppercase',color:'var(--fg-tertiary)'}}>{children}</span>
      {action}
    </div>
  );
}
function Pill({ tone='ok', children, icon }) {
  const map={ok:['var(--accent-soft)','var(--accent-deep)'],warn:['var(--warn-soft)','var(--warn-fg)'],
    danger:['var(--danger-soft)','var(--danger-fg)'],info:['var(--info-soft)','var(--info-fg)'],
    neutral:['var(--surface-alt)','var(--fg-secondary)']}[tone];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',borderRadius:999,
    background:map[0],color:map[1],fontSize:11,fontWeight:700,letterSpacing:.2}}>{icon}{children}</span>;
}

// ═══════════════════════════════════════════════════════════════
// GOALS SCREEN
// ═══════════════════════════════════════════════════════════════
// Single source of truth: 14-week plan, 98 days out, now Base wk 1/2.
const PLAN = {
  name:'Marathon Amsterdam', year:'2026',
  raceDate:'Sun 18 Oct 2026', daysToGo:98,
  phases:[
    {id:'base', label:'Base', weeks:2, state:'current', progress:0.35},
    {id:'build',label:'Build',weeks:8, state:'future'},
    {id:'peak', label:'Peak', weeks:2, state:'future'},
    {id:'taper',label:'Taper',weeks:2, state:'future'},
  ],
  currentPhase:'Base Building', currentWeek:1, phaseWeeks:2,
  nextPhase:'Build starts 26 Jul',
};

function GoalsScreen({ onEdit }) {
  return (
    <Chrome active="Goals">
      <div className="scroll">
        <div style={{padding:'8px 0 90px'}}>

          {/* Title */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',padding:'4px 20px 12px'}}>
            <div>
              <div style={{fontSize:11,color:'var(--fg-tertiary)',fontWeight:600,textTransform:'uppercase',letterSpacing:.8}}>1 active · 0 completed</div>
              <div style={{fontSize:29,fontWeight:700,letterSpacing:'-0.02em',color:'var(--fg-primary)',lineHeight:1.1,marginTop:3}}>Goals</div>
            </div>
            <button style={{border:0,background:'var(--surface)',cursor:'pointer',width:36,height:36,borderRadius:999,boxShadow:'var(--shadow-sm)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--fg-primary)'}}>
              <IcPlus size={18}/>
            </button>
          </div>

          {/* HERO: goal identity + countdown + status verdict */}
          <div style={{padding:'0 16px 14px'}}>
            <div style={{background:'var(--surface)',borderRadius:18,boxShadow:'var(--shadow-sm)',overflow:'hidden',border:'0.5px solid var(--border)'}}>
              {/* identity */}
              <div style={{padding:'15px 16px 13px',display:'flex',gap:12,alignItems:'flex-start'}} onClick={onEdit}>
                <div style={{width:38,height:38,borderRadius:11,background:'var(--accent-soft)',color:'var(--accent-deep)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                  <IcRun size={20}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3}}>
                    <Pill tone="ok">Active</Pill>
                    <Pill tone="neutral">AI plan</Pill>
                  </div>
                  <div style={{fontSize:19,fontWeight:700,color:'var(--fg-primary)',letterSpacing:'-0.01em',lineHeight:1.15}}>{PLAN.name} {PLAN.year}</div>
                  <div style={{fontSize:12.5,color:'var(--fg-secondary)',marginTop:3,display:'flex',alignItems:'center',gap:5}}>
                    <IcCal size={13} style={{color:'var(--fg-tertiary)'}}/> {PLAN.raceDate}
                  </div>
                </div>
                <div style={{textAlign:'right',flex:'none'}}>
                  <div style={{fontFamily:'Nunito,system-ui',fontWeight:800,fontSize:26,color:'var(--fg-primary)',letterSpacing:'-0.02em',lineHeight:1}}>{PLAN.daysToGo}</div>
                  <div style={{fontSize:10,color:'var(--fg-tertiary)',fontWeight:700,textTransform:'uppercase',letterSpacing:.6,marginTop:2}}>days</div>
                </div>
              </div>

              {/* STATUS VERDICT — the #1 addition */}
              <div style={{margin:'0 12px 12px',background:'var(--accent-soft)',borderRadius:12,padding:'11px 13px',display:'flex',gap:10,alignItems:'flex-start'}}>
                <div style={{width:24,height:24,borderRadius:999,background:'var(--accent)',color:'var(--fg-on-accent)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',marginTop:1}}>
                  <IcCheck size={14} sw={2.6}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:700,color:'var(--accent-deep)'}}>On track</div>
                  <div style={{fontSize:12.5,color:'var(--fg-secondary)',lineHeight:1.45,marginTop:1}}>
                    It's week 1 — you've already hit your 13 km long-run milestone. Training load is right on pace; nudge your weekly distance up a touch.
                  </div>
                </div>
              </div>

              <div style={{height:.5,background:'var(--divider)'}}/>

              {/* phase timeline */}
              <div style={{padding:'12px 16px 14px'}}>
                <PhaseTimeline/>
              </div>
            </div>
          </div>

          {/* PROGRESS THIS PHASE */}
          <Section action={<span style={{fontSize:11,color:'var(--fg-tertiary)'}}>Base · week 1 of 2</span>}>Progress this phase</Section>
          <div style={{padding:'0 16px 16px'}}>
            <div style={{background:'var(--surface)',borderRadius:14,boxShadow:'var(--shadow-sm)',overflow:'hidden'}}>
              {/* cumulative metric w/ expected-now marker */}
              <ProgressRow icon={<IcBolt size={13}/>} label="Training load"
                statusLabel="On pace" statusTone="ok"
                value={24} expected={22}
                right={<><b>144</b> <span style={{color:'var(--fg-tertiary)'}}>/ 600 TRIMP</span></>}/>
              <ProgressRow icon={<IcTrend size={13}/>} label="Running distance"
                statusLabel="Slightly behind" statusTone="warn"
                value={14} expected={22}
                right={<><b>9</b> <span style={{color:'var(--fg-tertiary)'}}>/ 66 km</span></>}/>
              {/* max/threshold metric → achieved badge, no anxiety bar */}
              <AchievedRow icon={<IcRuler size={13}/>} label="Longest run"
                detail="Target ≥ 13 km" value="14 km" last/>
            </div>
            <div style={{padding:'8px 6px 0',fontSize:11,color:'var(--fg-tertiary)',lineHeight:1.45,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:10,height:10,display:'inline-flex'}}>
                <svg width="10" height="10"><line x1="5" y1="0" x2="5" y2="10" stroke="var(--fg-secondary)" strokeWidth="1.5"/></svg>
              </span>
              The line marks where you should be today.
            </div>
          </div>

          {/* MILESTONES */}
          <Section>Milestones</Section>
          <div style={{padding:'0 16px 16px'}}>
            <div style={{background:'var(--surface)',borderRadius:14,boxShadow:'var(--shadow-sm)',overflow:'hidden'}}>
              <PhaseGroup phase="Base Building" dates="12 Jul – 26 Jul · 2w" state="current" defaultOpen
                milestones={[
                  {label:'Longest run ≥ 13 km', done:true, value:'14 km ✓'},
                  {label:'Weekly load ≥ 300 TRIMP', done:false, value:'144 / 300'},
                ]}/>
              <PhaseGroup phase="Build Phase" dates="26 Jul – 20 Sep · 8w" state="locked"
                milestones={[
                  {label:'Longest run ≥ 19 km', value:'≥ 19 km'},
                  {label:'Weekly load ≥ 400 TRIMP', value:'≥ 400'},
                  {label:'28 km long run', value:'6 Sep', target:true},
                ]}/>
              <PhaseGroup phase="Peak Phase" dates="20 Sep – 4 Oct · 2w" state="locked" milestones={[]}/>
              <PhaseGroup phase="Taper" dates="4 Oct – 18 Oct · 2w" state="locked" milestones={[]} last/>
            </div>
          </div>

          {/* edit affordance */}
          <div style={{padding:'0 16px'}}>
            <button onClick={onEdit} style={{width:'100%',border:'0.5px solid var(--border)',background:'var(--surface)',borderRadius:12,padding:'13px 14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:'var(--fg-primary)',fontSize:14,fontWeight:600,fontFamily:'inherit',boxShadow:'var(--shadow-sm)'}}>
              Edit goal
            </button>
          </div>

        </div>
      </div>
    </Chrome>
  );
}

function PhaseTimeline() {
  const total = PLAN.phases.reduce((s,p)=>s+p.weeks,0);
  return (
    <div>
      <div style={{display:'flex',marginBottom:6}}>
        {PLAN.phases.map(p=>(
          <div key={p.id} style={{flex:p.weeks,textAlign:'center'}}>
            <div style={{fontSize:9.5,fontWeight:p.state==='current'?800:600,letterSpacing:.5,textTransform:'uppercase',
              color:p.state==='current'?'var(--accent-deep)':p.state==='done'?'var(--fg-secondary)':'var(--fg-tertiary)'}}>{p.label}</div>
            <div style={{fontSize:9.5,color:'var(--fg-tertiary)'}}>{p.weeks}w</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:3,height:9}}>
        {PLAN.phases.map(p=>{
          const bg = p.state==='done'?'var(--accent)':p.state==='current'?'var(--accent-soft)':'var(--track)';
          return (
            <div key={p.id} style={{flex:p.weeks,background:bg,borderRadius:999,position:'relative',overflow:'hidden'}}>
              {p.state==='current' && <div style={{position:'absolute',top:0,bottom:0,left:0,width:(p.progress*100)+'%',background:'var(--accent)',borderRadius:999}}/>}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginTop:10}}>
        <div style={{fontSize:12,color:'var(--fg-secondary)'}}>
          <b style={{color:'var(--fg-primary)'}}>{PLAN.currentPhase}</b> · week {PLAN.currentWeek} of {PLAN.phaseWeeks}
        </div>
        <div style={{fontSize:11,color:'var(--fg-tertiary)'}}>{PLAN.nextPhase}</div>
      </div>
    </div>
  );
}

function ProgressRow({ icon, label, statusLabel, statusTone, value, expected, right, last }) {
  const barColor = statusTone==='warn' ? 'var(--warn)' : 'var(--accent)';
  return (
    <div style={{padding:'12px 14px',borderBottom:last?0:'0.5px solid var(--divider)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:9}}>
        <div style={{width:24,height:24,borderRadius:7,background:'var(--surface-alt)',color:'var(--fg-secondary)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,color:'var(--fg-primary)'}}>{label}</div>
          <div style={{marginTop:2}}><Pill tone={statusTone}>{statusLabel}</Pill></div>
        </div>
        <div style={{fontFamily:'Nunito,system-ui',fontSize:13,fontWeight:700,color:'var(--fg-primary)'}}>{right}</div>
      </div>
      <div style={{position:'relative',height:6,borderRadius:999,background:'var(--track)',overflow:'visible'}}>
        <div style={{width:value+'%',height:'100%',background:barColor,borderRadius:999}}/>
        <div style={{position:'absolute',top:-3,bottom:-3,left:expected+'%',width:2,borderRadius:2,background:'var(--fg-secondary)',opacity:.7}}/>
      </div>
    </div>
  );
}

function AchievedRow({ icon, label, detail, value, last }) {
  return (
    <div style={{padding:'12px 14px',borderBottom:last?0:'0.5px solid var(--divider)',display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:24,height:24,borderRadius:7,background:'var(--accent-soft)',color:'var(--accent-deep)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--fg-primary)'}}>{label}</div>
        <div style={{fontSize:11,color:'var(--fg-tertiary)',marginTop:1}}>{detail}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontFamily:'Nunito,system-ui',fontSize:14,fontWeight:700,color:'var(--fg-primary)'}}>{value}</span>
        <div style={{width:22,height:22,borderRadius:999,background:'var(--accent)',color:'var(--fg-on-accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <IcCheck size={13} sw={2.6}/>
        </div>
      </div>
    </div>
  );
}

function PhaseGroup({ phase, dates, state, milestones, defaultOpen, last }) {
  const [open,setOpen] = React.useState(!!defaultOpen);
  const current = state==='current';
  const dotColor = current ? 'var(--accent)' : 'var(--fg-tertiary)';
  const doneCount = milestones.filter(m=>m.done).length;
  return (
    <div style={{borderBottom:last?0:'0.5px solid var(--divider)'}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:11,padding:'12px 14px',cursor:'pointer'}}>
        <div style={{width:10,height:10,borderRadius:999,background:dotColor,flex:'none',boxShadow:current?'0 0 0 3px var(--accent-soft)':'none'}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14.5,fontWeight:600,color:'var(--fg-primary)'}}>{phase}</div>
          <div style={{fontSize:11,color:'var(--fg-tertiary)',marginTop:1}}>{dates}</div>
        </div>
        {current
          ? <Pill tone="ok">Now{milestones.length?` · ${doneCount}/${milestones.length}`:''}</Pill>
          : <span style={{fontSize:11,color:'var(--fg-tertiary)',fontWeight:600}}>Upcoming</span>}
        {milestones.length>0 && (open?<IcChevU size={15} style={{color:'var(--fg-tertiary)'}}/>:<IcChevD size={15} style={{color:'var(--fg-tertiary)'}}/>)}
      </div>
      {open && milestones.map((m,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:11,padding:'9px 14px 9px 35px'}}>
          <div style={{width:18,height:18,borderRadius:999,flex:'none',display:'flex',alignItems:'center',justifyContent:'center',
            background:m.done?'var(--accent)':'transparent',color:m.done?'var(--fg-on-accent)':'var(--fg-tertiary)',
            border:m.done?0:m.target?'0':'1.5px dashed var(--border)'}}>
            {m.done ? <IcCheck size={11} sw={2.6}/> : m.target ? <IcFlag size={11} style={{color:'var(--fg-tertiary)'}}/> : null}
          </div>
          <div style={{flex:1,fontSize:13,color:m.done?'var(--fg-primary)':'var(--fg-secondary)',fontWeight:m.done?600:400}}>{m.label}</div>
          <div style={{fontSize:12,color:m.done?'var(--accent-deep)':'var(--fg-tertiary)',fontWeight:m.done?700:500}}>{m.value}</div>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// EDIT / CREATE / DELETE GOAL
// ═══════════════════════════════════════════════════════════════
function EditGoalScreen({ mode='edit', onBack }) {
  const isNew = mode==='create';
  const [name,setName] = React.useState(isNew?'':'Marathon Amsterdam 2026');
  const [wantsTime,setWantsTime] = React.useState(!isNew);
  const [achieved,setAchieved] = React.useState(false);

  return (
    <Chrome active="Goals">
      <div className="scroll">
        <div style={{padding:'6px 0 100px'}}>
          {/* Nav */}
          <div style={{display:'flex',alignItems:'center',padding:'2px 14px 8px',position:'relative',height:44}}>
            <button onClick={onBack} style={{width:36,height:36,borderRadius:999,border:0,background:'var(--surface)',boxShadow:'var(--shadow-sm)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--fg-primary)'}}>
              <IcChev size={18} style={{transform:'scaleX(-1)'}}/>
            </button>
            <div style={{position:'absolute',left:0,right:0,textAlign:'center',fontSize:16,fontWeight:700,color:'var(--fg-primary)',pointerEvents:'none'}}>
              {isNew?'New goal':'Edit goal'}
            </div>
          </div>

          {/* DETAILS */}
          <Section>Details</Section>
          <FormGroup>
            <div style={{padding:'13px 15px',borderBottom:'0.5px solid var(--divider)'}}>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Goal name"
                style={{width:'100%',border:0,outline:0,background:'transparent',font:'inherit',fontSize:16,fontWeight:600,color:'var(--fg-primary)'}}/>
            </div>
            <div style={{padding:'13px 15px',minHeight:70}}>
              <textarea placeholder="Extra notes (optional)" rows={2}
                style={{width:'100%',border:0,outline:0,background:'transparent',font:'inherit',fontSize:14,color:'var(--fg-primary)',resize:'none'}}/>
            </div>
          </FormGroup>

          {/* SPORT + EVENT */}
          <div style={{height:14}}/>
          <Section>Sport & event</Section>
          <FormGroup>
            <PickerRow label="Sport" value="Running"/>
            <PickerRow label="Event type" value="Single-day race"/>
            <PickerRow label="Intent" value="Finish / Enjoy" last/>
          </FormGroup>

          {/* TARGET */}
          <div style={{height:14}}/>
          <Section>Target</Section>
          <FormGroup footer="Race day — the coach counts back from here to phase your plan.">
            <DateRow label="Race date" value="18 Oct 2026" icon={<IcCal size={14}/>}/>
            <ToggleRow label="Set a target time" on={wantsTime} onChange={setWantsTime}/>
            {wantsTime && (
              // FIX: this is a DURATION, not a time-of-day (old build showed 4:00 AM)
              <div style={{padding:'12px 15px',display:'flex',alignItems:'center',gap:12,borderTop:'0.5px solid var(--divider)'}}>
                <div style={{width:28,height:28,borderRadius:8,background:'var(--accent-soft)',color:'var(--accent-deep)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                  <IcTrophy size={14}/>
                </div>
                <div style={{flex:1,fontSize:15,color:'var(--fg-primary)'}}>Finish time</div>
                <DurationStepper/>
              </div>
            )}
          </FormGroup>

          {/* STATUS */}
          <div style={{height:14}}/>
          <Section>Status</Section>
          <FormGroup>
            <ToggleRow label="Mark as achieved" sub="Move this goal to Completed" on={achieved} onChange={setAchieved} last/>
          </FormGroup>

          {/* SAVE */}
          <div style={{padding:'22px 16px 0'}}>
            <button style={{width:'100%',height:50,border:0,borderRadius:14,background:'var(--accent)',color:'var(--fg-on-accent)',fontSize:16,fontWeight:600,fontFamily:'inherit',cursor:'pointer',boxShadow:'0 4px 14px rgba(107,142,90,0.25)'}}>
              {isNew?'Create goal':'Save changes'}
            </button>
          </div>

          {/* DELETE (edit only) — destructive, terracotta not pure red */}
          {!isNew && (
            <div style={{padding:'10px 16px 0'}}>
              <button style={{width:'100%',height:46,border:'0.5px solid var(--danger)',borderRadius:14,background:'transparent',color:'var(--danger)',fontSize:15,fontWeight:600,fontFamily:'inherit',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                <IcTrash size={16}/> Delete goal
              </button>
            </div>
          )}
        </div>
      </div>
    </Chrome>
  );
}

function FormGroup({ children, footer }) {
  return (
    <div>
      <div style={{background:'var(--surface)',borderRadius:14,margin:'0 16px',overflow:'hidden',boxShadow:'var(--shadow-sm)'}}>{children}</div>
      {footer && <div style={{padding:'8px 20px 0',fontSize:11.5,color:'var(--fg-tertiary)',lineHeight:1.45}}>{footer}</div>}
    </div>
  );
}
function PickerRow({ label, value, last }) {
  return (
    <div style={{display:'flex',alignItems:'center',padding:'13px 15px',borderBottom:last?0:'0.5px solid var(--divider)'}}>
      <span style={{flex:1,fontSize:15,color:'var(--fg-primary)'}}>{label}</span>
      <span style={{fontSize:15,fontWeight:600,color:'var(--accent-deep)',display:'flex',alignItems:'center',gap:5}}>
        {value}<IcChevD size={14}/>
      </span>
    </div>
  );
}
function DateRow({ label, value, icon, last }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 15px',borderBottom:last?0:'0.5px solid var(--divider)'}}>
      <div style={{width:28,height:28,borderRadius:8,background:'var(--accent-soft)',color:'var(--accent-deep)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>{icon}</div>
      <span style={{flex:1,fontSize:15,color:'var(--fg-primary)'}}>{label}</span>
      <span style={{fontSize:14,fontWeight:600,color:'var(--fg-primary)',background:'var(--surface-alt)',padding:'6px 12px',borderRadius:9}}>{value}</span>
    </div>
  );
}
function ToggleRow({ label, sub, on, onChange, last }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 15px',borderBottom:last?0:'0.5px solid var(--divider)'}}>
      <div style={{flex:1}}>
        <div style={{fontSize:15,color:'var(--fg-primary)'}}>{label}</div>
        {sub && <div style={{fontSize:12,color:'var(--fg-tertiary)',marginTop:1}}>{sub}</div>}
      </div>
      <div onClick={()=>onChange(!on)} style={{width:46,height:28,borderRadius:999,background:on?'var(--accent)':'var(--track)',position:'relative',cursor:'pointer',transition:'background .15s',flex:'none'}}>
        <div style={{position:'absolute',top:2,left:on?20:2,width:24,height:24,borderRadius:999,background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.2)',transition:'left .15s'}}/>
      </div>
    </div>
  );
}
function DurationStepper() {
  const [h,setH] = React.useState(3), [m,setM] = React.useState(45);
  const box = (v,u) => (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{fontFamily:'Nunito,system-ui',fontSize:20,fontWeight:800,color:'var(--fg-primary)',letterSpacing:'-0.02em'}}>{String(v).padStart(2,'0')}</div>
      <div style={{fontSize:9,color:'var(--fg-tertiary)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>{u}</div>
    </div>
  );
  return (
    <div style={{display:'flex',alignItems:'center',gap:4,background:'var(--surface-alt)',borderRadius:10,padding:'6px 12px'}}>
      {box(h,'hr')}
      <span style={{fontFamily:'Nunito,system-ui',fontSize:20,fontWeight:800,color:'var(--fg-tertiary)',marginTop:-6}}>:</span>
      {box(m,'min')}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════════
function App() {
  const [mode,setMode] = React.useState('light');
  React.useEffect(()=>{ document.body.setAttribute('data-canvas',mode); },[mode]);

  const frames = [
    ['Goals — overview', <GoalsScreen/>],
    ['Edit goal', <EditGoalScreen mode="edit"/>],
    ['New goal', <EditGoalScreen mode="create"/>],
  ];

  return (
    <div className="page">
      <div className="page-head">
        <div className="page-title">Goals — redesign</div>
        <p className="page-sub">
          Rebuilt around one question: <b>“will I make it?”</b> A status verdict leads, phase math is consistent
          (Base 2w · Build 8w · Peak 2w · Taper 2w = 98 days), every cumulative bar carries an <b>expected-today</b> marker,
          achieved milestones get a check (not an anxious bar), and the active phase reads “Now” instead of a lock.
          Plus the edit / create / delete screen — with the target time fixed to a real duration.
        </p>
        <div className="mode-toggle">
          <button className={mode==='light'?'active':''} onClick={()=>setMode('light')}>☀︎ Light</button>
          <button className={mode==='dark'?'active':''} onClick={()=>setMode('dark')}>☾ Dark</button>
        </div>
      </div>
      <div className="row-frames">
        {frames.map(([label,node],i)=>(
          <div className="frame-wrap" key={i}>
            <div className="frame-label">{String(i+1).padStart(2,'0')} · {label}</div>
            <div className="iphone" data-mode={mode} data-screen-label={label}>{node}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

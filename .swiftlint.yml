# SwiftLint config voor VibeCoach
#
# Filosofie: catch real bugs (force-unwrap, switch-misalignment, redundante code)
# zonder noise op stijl-zaken die geen echte regressie zijn (line-length,
# function-body-length). Codebase heeft Nederlandse comments (die zijn relatief
# wordy) en lange Coach-prompts die niet zinvol gesplitst kunnen worden.

# Alleen production-source linten in deze eerste pass; tests volgen later.
included:
  - AIFitnessCoach

excluded:
  - AIFitnessCoachTests
  - AIFitnessCoachUITests
  - .build
  - DerivedData

disabled_rules:
  # Stijl-rules met te veel ruis voor te weinig waarde in deze codebase:
  - line_length              # 460 violations — Dutch comments + Coach-prompts zijn wordy
  - identifier_name          # 171 violations — kort loop-vars (i, r, hr, f) zijn idiomatisch
  - function_body_length     # 17 violations — Coach-prompt-builders zijn intentioneel lang
  - file_length              # 15 violations — Models/Services zijn pragmatisch grouped
  - type_body_length         # 12 violations — ChatViewModel + DashboardView zijn rijke views
  - cyclomatic_complexity    # 9 violations — Coach-prompt-context heeft veel branches
  - todo                     # 1 violation — TODOs zijn waardevol als doc-aanknopingspunt

  # Patroon-rules die in SwiftUI / pragmatic tuples geen echte waarde toevoegen:
  - switch_case_alignment    # 15 violations — inline single-line switches zijn leesbaar
  - multiple_closures_with_trailing_closure  # 7 — SwiftUI Button/label-patroon is idiomatisch
  - redundant_string_enum_value              # 7 — SportCategory etc. expliciete raws voor Codable-stabiliteit
  - large_tuple                              # 6 — type-introductie is invasief; trade voor leesbaarheid
  - function_parameter_count                 # 2 — refactor zou protocol-injection vragen, los onderwerp
  - vertical_parameter_alignment             # 3 — false-positives op multiline parameter-strings

opt_in_rules: []
  # `force_unwrapping` (77 violations) bewust niet aan in deze eerste cleanup —
  # de meeste zijn benign idioms (`guard x == nil || x! > now`) waar de nil-check
  # wél gedaan is maar SwiftLint dat niet kan zien. Aparte audit-PR
  # (`chore/force-unwrap-audit`) loopt later: per call-site evalueren en
  # ofwel naar `if let` ofwel comment-supressie. Tot die tijd geen
  # regel-aan-met-77-bestaande-violations — dat blokkeert alle nieuwe PR's.
